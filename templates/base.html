<!DOCTYPE html>
<html>
<head>
    <title>FinTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
body.dark-mode {
    background-color: #0b1220 !important;
    color: #e5e7eb;
}

.dark-mode .bg-white {
    background-color: #111827 !important;
    color: #e5e7eb !important;
}

.dark-mode .border {
    border-color: #1f2937 !important;
}

.dark-mode .table {
    color: #e5e7eb;
}

.dark-mode .text-muted {
    color: #9ca3af !important;
}
.dark-mode .table {
    background-color: #111827 !important;
    color: #e5e7eb !important;
}

.dark-mode .table thead {
    background-color: #0f172a !important;
    color: #94a3b8 !important;
}

.dark-mode .table tbody tr {
    background-color: #111827 !important;
    border-color: #1f2937 !important;
}

.dark-mode .table tbody tr:hover {
    background-color: #1e293b !important;
}
</style>
</head>

<body style="background-color: #f4f7fb;">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark px-4 py-3" style="background: #0f172a;">

        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            FinTrack
        </a>

        <div class="ms-auto d-flex align-items-center gap-2">

            {% if user.is_authenticated %}

                <a href="{% url 'add_transaction' %}" class="btn btn-success btn-sm">
                    + Add Transaction
                </a>

                <span class="text-white small">
                    Hello, {{ user.username }}
                </span>

                <!-- LOGOUT -->
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        Logout
                    </button>
                </form>
                <button
                   class="btn btn-sm btn-outline-light"
                   id="themeBtn"
                   onclick="toggleDarkMode()"
>
            🌙 
           </button>

            {% else %}

                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
                    Login
                </a>

                <a href="{% url 'signup' %}" class="btn btn-success btn-sm">
                    Sign Up
                </a>

            {% endif %}

        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <main class="container py-5">
        {% block content %}
        {% endblock %}
    </main>

    <script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    const btn = document.getElementById("themeBtn");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
        if (btn) btn.innerText = "☀️ ";
    } else {
        localStorage.setItem("theme", "light");
        if (btn) btn.innerText = "🌙 ";
    }
}

window.onload = function () {
    const theme = localStorage.getItem("theme");

    const btn = document.getElementById("themeBtn");

    if (theme === "dark") {
        document.body.classList.add("dark-mode");
        if (btn) btn.innerText = "☀️";
    }
};
</script>
</body>
</html>
