{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">

                <h2 class="fw-bold mb-4 text-center">Add Transaction</h2>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Food, Salary, Transport" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Amount</label>
                        <input type="number" step="0.01" name="amount" class="form-control" placeholder="e.g. 50.00" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-control" required>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Salary">Salary</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Transaction Type</label>
                        <select name="transaction_type" class="form-control" required>
                            <option value="Income">Income</option>
                            <option value="Expense">Expense</option>
                        </select>
                    </div>

                    <button class="btn btn-success w-100">
                        Save Transaction
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>

{% endblock %}
